version: '3.9'
services:
  # PostgreSQL - قاعدة البيانات الأساسية
  postgres:
    image: postgres:16-alpine
    container_name: threadly_postgres
    environment:
      POSTGRES_USER: threadly
      POSTGRES_PASSWORD: threadly_dev_password
      POSTGRES_DB: threadly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threadly"]
      interval: 5s
      timeout: 5s
      retries: 5
  # Redis - للكاش والـ jobs الخلفية
  redis:
    image: redis:7-alpine
    container_name: threadly_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  # MinIO - S3-compatible للصور (مجاني محلياً)
  minio:
    image: minio/minio:latest
    container_name: threadly_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"      # API
      - "9001:9001"      # Console (افتح http://localhost:9001)
    volumes:
      - minio_data:/data
  # Mailpit - إيميل وهمي للتطوير (تشوف الإيميلات بدون إرسال حقيقي)
  mailpit:
    image: axllent/mailpit:latest
    container_name: threadly_mailpit
    ports:
      - "1025:1025"      # SMTP
      - "8025:8025"      # Web UI (افتح http://localhost:8025)
  # FastAPI Backend
  api:
    build: .
    container_name: threadly_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://threadly:threadly_dev_password@postgres:5432/threadly_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production-please
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: threadly-images
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      # AI Provider - استخدم أي واحد مجاني
      AI_PROVIDER: groq                  # groq | gemini | ollama
      GROQ_API_KEY: ${GROQ_API_KEY:-}    # احصل عليه مجاناً من console.groq.com
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FIREBASE_CREDENTIALS_PATH: /code/serviceAccount.json   # 👈 جديد
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./app:/code/app
      - ./alembic:/code/alembic
      - ./serviceAccount.json:/code/serviceAccount.json:ro   # 👈 جديد
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
volumes:
  postgres_data:
  redis_data:
  minio_data: